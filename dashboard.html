<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightYears Health - CRM Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        .card{transition:all .2s}.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
        .nav-tab{padding:.75rem 1rem;font-size:.875rem;cursor:pointer;border-bottom:2px solid transparent;color:#6b7280;white-space:nowrap}
        .nav-tab:hover{color:#374151}.nav-tab.active{border-bottom-color:#2563eb;color:#2563eb;font-weight:600}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.skeleton{animation:pulse 1.5s ease-in-out infinite;background:#e5e7eb;border-radius:.375rem}
        .day-cell{width:14px;height:14px;border-radius:2px;display:inline-block;margin:1px}.funnel-bar{transition:width .6s ease}
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between py-3">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">LY</span></div>
                    <div class="hidden sm:block"><h1 class="text-base font-semibold text-gray-900 leading-tight">LightYears Health</h1><p class="text-xs text-gray-400">CRM Dashboard</p></div>
                </a>
                <div class="flex items-center gap-3">
                    <button onclick="refreshCurrentView()" class="px-3 py-1.5 text-xs bg-blue-50 text-blue-700 rounded-lg hover:bg-blue-100 transition flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        Refresh
                    </button>
                    <span class="text-xs text-gray-400 hidden sm:inline" id="lastUpdated"></span>
                </div>
            </div>
            <nav class="flex gap-0 overflow-x-auto -mb-px" id="mainNav">
                <button class="nav-tab active" data-route="overview">Overview</button>
                <button class="nav-tab" data-route="operations">Operations</button>
                <button class="nav-tab" data-route="clinical">Clinical</button>
                <button class="nav-tab" data-route="conversion">Conversion</button>
                <button class="nav-tab" data-route="users">Users</button>
                <button class="nav-tab" data-route="escalations">Escalations<span id="escBadge" class="hidden ml-1 px-1.5 py-0.5 bg-red-100 text-red-700 text-xs rounded-full">0</span></button>
                <button class="nav-tab" data-route="messages">Messages</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6" id="app">
        <div class="text-center py-12 text-gray-400">Loading...</div>
    </main>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://ycswtvovrdkbfchjjaio.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3d0dm92cmRrYmZjaGpqYWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDAzMjMsImV4cCI6MjA4NzkxNjMyM30.i1V8j18bTkWDhSF_hxFwxLm5wQDtDT8AyJCOarXViEw';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const TEAM = ['Abha', 'Dr. Devashree'];

// ============================================================
// STATE
// ============================================================
const state = { route: 'overview', userId: null, charts: {} };

// ============================================================
// UTILITIES
// ============================================================
const fmt = {
    date: d => d ? new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '-',
    dateTime: d => d ? new Date(d).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '-',
    currency: n => n != null ? '\u20B9' + Number(n).toLocaleString('en-IN') : '-',
    pct: n => n != null ? Number(n).toFixed(1) + '%' : '-',
    cap: s => s ? s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : '-',
    trunc: (s,n=60) => s && s.length > n ? s.slice(0,n)+'...' : (s||'-')
};
const statusColor = {enrolled:'bg-gray-100 text-gray-700',active:'bg-green-100 text-green-700',completed:'bg-blue-100 text-blue-700',dropped_off:'bg-red-100 text-red-700',paused:'bg-yellow-100 text-yellow-700'};
const sevColor = {high:'bg-red-100 text-red-700',medium:'bg-amber-100 text-amber-700',low:'bg-yellow-100 text-yellow-700'};
const stageLabel = {pain_management:'Pain Management',recovery:'Recovery',strengthening:'Strengthening'};
const COLORS = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16'];

function destroyAllCharts(){ Object.values(state.charts).forEach(c=>c.destroy()); state.charts={}; }
function B(text,cls){ return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${text}</span>`; }
function SC(label,value,color='text-gray-900',sub=''){
    return `<div class="card bg-white rounded-xl border border-gray-200 p-4"><p class="text-xs text-gray-500 uppercase tracking-wide">${label}</p><p class="text-2xl font-bold ${color} mt-1">${value}</p>${sub?`<p class="text-xs text-gray-400 mt-0.5">${sub}</p>`:''}</div>`;
}
function AC(label,count,color){
    const bg={red:'bg-red-50 border-red-200',amber:'bg-amber-50 border-amber-200',green:'bg-green-50 border-green-200'};
    const tx={red:'text-red-700',amber:'text-amber-700',green:'text-green-700'};
    return `<div class="rounded-xl border p-4 ${bg[color]||''}"><p class="text-xs ${tx[color]||''} uppercase tracking-wide">${label}</p><p class="text-3xl font-bold ${tx[color]||''} mt-1">${count}</p></div>`;
}
function ER(cols,msg='No data available'){ return `<tr><td colspan="${cols}" class="px-6 py-8 text-center text-gray-400">${msg}</td></tr>`; }
function csvExport(fn,headers,rows){
    const csv=[headers.join(','),...rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(','))].join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=fn; a.click();
}

// ============================================================
// ROUTER
// ============================================================
function parseRoute(){
    const h=(window.location.hash||'#overview').slice(1);
    if(h.startsWith('user/')) return {view:'user-profile',userId:h.split('/')[1]};
    return {view:h||'overview'};
}
function navigateTo(r){ window.location.hash=r; }
function handleRoute(){
    const {view,userId}=parseRoute();
    state.route=view; state.userId=userId||null;
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.route===view));
    document.getElementById('mainNav').style.display=view==='user-profile'?'none':'flex';
    destroyAllCharts();
    renderView(view,userId);
}
async function renderView(view,userId){
    const app=document.getElementById('app');
    app.innerHTML='<div class="flex justify-center py-12"><div class="w-8 h-8 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>';
    try{
        switch(view){
            case 'overview': await renderOverview(app); break;
            case 'operations': await renderOperations(app); break;
            case 'clinical': await renderClinical(app); break;
            case 'conversion': await renderConversion(app); break;
            case 'users': await renderUsers(app); break;
            case 'escalations': await renderEscalations(app); break;
            case 'messages': await renderMessages(app); break;
            case 'user-profile': await renderUserProfile(app,userId); break;
            default: app.innerHTML='<div class="text-center py-12 text-gray-500">Page not found</div>';
        }
        document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    }catch(err){
        console.error('View error:',err);
        app.innerHTML=`<div class="text-center py-12 text-red-500">Error loading data: ${err.message}</div>`;
    }
}
function refreshCurrentView(){ handleRoute(); }

// ============================================================
// VIEW: OVERVIEW
// ============================================================
async function renderOverview(app){
    const [sumR,trendR,enrR,ciR,escR]=await Promise.all([
        db.from('v_program_summary').select('*'),
        db.from('v_pain_score_trend').select('*').order('week_number'),
        db.from('program_enrollments').select('stage'),
        db.from('v_checkin_completion').select('*'),
        db.from('v_escalation_queue').select('id')
    ]);
    const s=sumR.data?.[0]||{};
    const trends=trendR.data||[], enrollments=enrR.data||[], checkins=ciR.data||[];
    const escCount=escR.data?.length||0;
    const eb=document.getElementById('escBadge');
    if(escCount>0){eb.textContent=escCount;eb.classList.remove('hidden');}else{eb.classList.add('hidden');}

    if(!s.total_enrollments){
        app.innerHTML=`<div class="text-center py-16"><div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4"><svg class="w-10 h-10 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div><h3 class="text-lg font-semibold text-gray-700 mb-2">No data yet</h3><p class="text-gray-500 text-sm max-w-md mx-auto">Submit an intake form and run the Boss Demo Fast-Forward workflow in n8n to populate sample data.</p></div>`;
        return;
    }

    app.innerHTML=`
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
        ${SC('Total Enrolled',s.total_enrollments||0)}
        ${SC('Active',s.active_users||0,'text-green-600')}
        ${SC('Completed',s.completed_users||0,'text-blue-600')}
        ${SC('Dropped Off',s.dropped_off_users||0,'text-red-500')}
        ${SC('Completion Rate',fmt.pct(s.completion_rate_pct))}
        ${SC('Total Revenue',fmt.currency(s.total_revenue),'text-gray-900',s.paying_customers?s.paying_customers+' customers':'')}
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-4">Pain Score Trend</h3>
            <div class="h-64"><canvas id="c1"></canvas></div>
            <p class="text-xs text-gray-400 mt-2">Individual pain scores across check-in weeks (lower is better)</p>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-4">Program Stage Distribution</h3>
            <div class="h-64 flex items-center justify-center"><canvas id="c2"></canvas></div>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-4">Check-in Completion Rate</h3>
            <div class="h-64"><canvas id="c3"></canvas></div>
        </div>
        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-4">Key Clinical Metrics</h3>
            <div class="space-y-3 mt-2" id="clinMet"></div>
        </div>
    </div>`;

    // Pain Trend
    if(trends.length){
        const um={};
        trends.forEach(d=>{if(!um[d.user_id])um[d.user_id]={name:d.name,pts:[]};um[d.user_id].pts.push({x:d.week_number,y:d.pain_score});});
        state.charts.c1=new Chart(document.getElementById('c1'),{type:'line',
            data:{datasets:Object.values(um).map((u,i)=>({label:u.name,data:u.pts,borderColor:COLORS[i%COLORS.length],backgroundColor:COLORS[i%COLORS.length]+'20',tension:.3,fill:false,pointRadius:4}))},
            options:{responsive:true,maintainAspectRatio:false,scales:{x:{type:'linear',title:{display:true,text:'Week'},min:0,max:12,ticks:{stepSize:2}},y:{title:{display:true,text:'Pain Score'},min:0,max:10}},plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}}}
        });
    }
    // Stage
    const sc={pain_management:0,recovery:0,strengthening:0};
    enrollments.forEach(e=>{if(sc.hasOwnProperty(e.stage))sc[e.stage]++;});
    state.charts.c2=new Chart(document.getElementById('c2'),{type:'doughnut',
        data:{labels:['Pain Mgmt (7+)','Recovery (4-6)','Strengthening (0-3)'],datasets:[{data:[sc.pain_management,sc.recovery,sc.strengthening],backgroundColor:['#ef4444','#f59e0b','#10b981'],borderWidth:0}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}}}
    });
    // Check-in
    if(checkins.length){
        state.charts.c3=new Chart(document.getElementById('c3'),{type:'bar',
            data:{labels:checkins.map(c=>c.name||'?'),datasets:[{label:'%',data:checkins.map(c=>c.completion_rate_pct||0),backgroundColor:checkins.map(c=>{const r=c.completion_rate_pct||0;return r>=75?'#10b981':r>=50?'#f59e0b':'#ef4444';}),borderRadius:4}]},
            options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,title:{display:true,text:'%'}}},plugins:{legend:{display:false}}}
        });
    }
    // Clinical Metrics
    const el=document.getElementById('clinMet');
    if(trends.length){
        const bu={};
        trends.forEach(t=>{if(!bu[t.user_id])bu[t.user_id]={baseline:t.baseline_pain_score,scores:[]};bu[t.user_id].scores.push(t.pain_score);});
        const us=Object.values(bu);
        const avgB=us.reduce((s,u)=>s+(u.baseline||0),0)/us.length;
        const avgL=us.reduce((s,u)=>s+(u.scores[u.scores.length-1]||0),0)/us.length;
        const avgR=avgB-avgL;
        const avgCi=checkins.length?checkins.reduce((s,c)=>s+(c.completion_rate_pct||0),0)/checkins.length:0;
        el.innerHTML=`
            <div class="flex justify-between items-center p-3 bg-green-50 rounded-lg"><span class="text-sm text-gray-700">Avg. Pain Reduction</span><span class="text-lg font-bold text-green-700">${avgR>0?'-':''}${avgR.toFixed(1)} pts</span></div>
            <div class="flex justify-between items-center p-3 bg-blue-50 rounded-lg"><span class="text-sm text-gray-700">Avg. Baseline Pain</span><span class="text-lg font-bold text-blue-700">${avgB.toFixed(1)}/10</span></div>
            <div class="flex justify-between items-center p-3 bg-purple-50 rounded-lg"><span class="text-sm text-gray-700">Avg. Latest Pain</span><span class="text-lg font-bold text-purple-700">${avgL.toFixed(1)}/10</span></div>
            <div class="flex justify-between items-center p-3 bg-amber-50 rounded-lg"><span class="text-sm text-gray-700">Avg. Check-in Rate</span><span class="text-lg font-bold text-amber-700">${avgCi.toFixed(0)}%</span></div>`;
    }else{el.innerHTML='<p class="text-sm text-gray-400 text-center py-4">No clinical data yet</p>';}
}

// VIEW: OPERATIONS
// ============================================================
async function renderOperations(app){
    const [mR,ciR,enR,eR]=await Promise.all([
        db.from('health_metrics').select('*, users(id,name,phone)').eq('metric_type','pain_score').order('week_number',{ascending:false}),
        db.from('v_checkin_completion').select('*'),
        db.from('program_enrollments').select('*, users(id,name,phone)').eq('status','active'),
        db.from('v_escalation_queue').select('*')
    ]);
    const metrics=mR.data||[],checkins=ciR.data||[],active=enR.data||[],escs=eR.data||[];
    const latestByUser={};
    metrics.forEach(m=>{if(!latestByUser[m.user_id]||m.week_number>latestByUser[m.user_id].week_number)latestByUser[m.user_id]=m;});
    const highPain=Object.values(latestByUser).filter(m=>m.value>=7);
    const missCi=checkins.filter(c=>c.status!=='completed'&&c.status!=='dropped_off'&&c.expected_checkins>0&&c.total_checkins<c.expected_checkins);
    const withMetrics=new Set(metrics.filter(m=>m.week_number>=4).map(m=>m.user_id));
    const atRisk=active.filter(e=>e.current_week>=4&&!withMetrics.has(e.user_id));

    app.innerHTML=`
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        ${AC('High Pain (\u22657)',highPain.length,highPain.length?'red':'green')}
        ${AC('Missing Check-ins',missCi.length,missCi.length?'amber':'green')}
        ${AC('At-Risk Drop-offs',atRisk.length,atRisk.length?'amber':'green')}
        ${AC('Open Escalations',escs.length,escs.length?'red':'green')}
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-6">
        <div class="px-6 py-4 border-b border-gray-100 bg-red-50"><h3 class="text-sm font-semibold text-red-700">Needs Attention: High Pain Score (\u22657)</h3></div>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Name</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Phone</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Latest Pain</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Week</th>
        </tr></thead><tbody class="divide-y divide-gray-100">
            ${!highPain.length?ER(4,'No users with high pain'):highPain.map(m=>`<tr class="hover:bg-gray-50 cursor-pointer" onclick="navigateTo('user/${m.user_id}')"><td class="px-6 py-3 font-medium">${m.users?.name||'-'}</td><td class="px-6 py-3 text-gray-500">${m.users?.phone||'-'}</td><td class="px-6 py-3"><span class="text-red-600 font-bold">${m.value}/10</span></td><td class="px-6 py-3">Week ${m.week_number}</td></tr>`).join('')}
        </tbody></table></div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-6">
        <div class="px-6 py-4 border-b border-gray-100 bg-amber-50"><h3 class="text-sm font-semibold text-amber-700">Missing Check-ins</h3></div>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Name</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Phone</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Done</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Expected</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Rate</th>
        </tr></thead><tbody class="divide-y divide-gray-100">
            ${!missCi.length?ER(5,'All check-ins up to date'):missCi.map(c=>`<tr class="hover:bg-gray-50 cursor-pointer" onclick="navigateTo('user/${c.user_id}')"><td class="px-6 py-3 font-medium">${c.name||'-'}</td><td class="px-6 py-3 text-gray-500">${c.phone||'-'}</td><td class="px-6 py-3">${c.total_checkins}</td><td class="px-6 py-3">${c.expected_checkins}</td><td class="px-6 py-3">${B(fmt.pct(c.completion_rate_pct),(c.completion_rate_pct||0)>=75?'bg-green-100 text-green-700':'bg-red-100 text-red-700')}</td></tr>`).join('')}
        </tbody></table></div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 bg-amber-50"><h3 class="text-sm font-semibold text-amber-700">At Risk of Drop-off</h3></div>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Name</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Phone</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Week</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Stage</th>
        </tr></thead><tbody class="divide-y divide-gray-100">
            ${!atRisk.length?ER(4,'No users at risk'):atRisk.map(e=>`<tr class="hover:bg-gray-50 cursor-pointer" onclick="navigateTo('user/${e.user_id}')"><td class="px-6 py-3 font-medium">${e.users?.name||'-'}</td><td class="px-6 py-3 text-gray-500">${e.users?.phone||'-'}</td><td class="px-6 py-3">Week ${e.current_week}/12</td><td class="px-6 py-3">${B(stageLabel[e.stage]||e.stage,'bg-gray-100 text-gray-600')}</td></tr>`).join('')}
        </tbody></table></div>
    </div>`;
}

// VIEW: CLINICAL
// ============================================================
async function renderClinical(app){
    const [tR,dR,eR,iR]=await Promise.all([
        db.from('v_pain_score_trend').select('*').order('week_number'),
        db.from('daily_progress').select('*'),
        db.from('program_enrollments').select('*, users(name)'),
        db.from('intake_responses').select('user_id,pain_score')
    ]);
    const trends=tR.data||[],daily=dR.data||[],enrollments=eR.data||[],intakes=iR.data||[];

    // Avg pain by week
    const wp={};
    trends.forEach(t=>{if(!wp[t.week_number])wp[t.week_number]=[];wp[t.week_number].push(t.pain_score);});
    const weeks=Object.keys(wp).sort((a,b)=>a-b);
    const avgPW=weeks.map(w=>({week:+w,avg:wp[w].reduce((s,v)=>s+v,0)/wp[w].length}));

    // Before/After
    const upain={};
    trends.forEach(t=>{
        if(!upain[t.user_id])upain[t.user_id]={name:t.name,baseline:t.baseline_pain_score,latest:t.pain_score,lw:0};
        if(t.week_number>(upain[t.user_id].lw||0)){upain[t.user_id].latest=t.pain_score;upain[t.user_id].lw=t.week_number;}
    });

    // Daily adherence by week
    const wa={};
    daily.forEach(d=>{const w=Math.ceil(d.day_number/7);if(!wa[w])wa[w]={t:0,c:0};wa[w].t++;if(d.status==='completed')wa[w].c++;});
    const aw=Object.keys(wa).sort((a,b)=>a-b);

    // Stage effectiveness
    const sd={};
    enrollments.forEach(e=>{
        if(!sd[e.stage])sd[e.stage]={count:0,completed:0,baselines:[],finals:[]};
        sd[e.stage].count++;
        if(e.status==='completed')sd[e.stage].completed++;
        const intake=intakes.find(i=>i.user_id===e.user_id);
        if(intake)sd[e.stage].baselines.push(intake.pain_score);
        const ut=trends.filter(t=>t.user_id===e.user_id);
        if(ut.length)sd[e.stage].finals.push(ut[ut.length-1].pain_score);
    });

    app.innerHTML=`
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="text-sm font-semibold text-gray-700 mb-4">Average Pain Score by Week</h3><div class="h-64"><canvas id="c4"></canvas></div></div>
        <div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="text-sm font-semibold text-gray-700 mb-4">Before vs After Pain Score</h3><div class="h-64"><canvas id="c5"></canvas></div></div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="text-sm font-semibold text-gray-700 mb-4">Daily Exercise Adherence by Week</h3><div class="h-64"><canvas id="c6"></canvas></div></div>
        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h3 class="text-sm font-semibold text-gray-700 mb-4">Program Effectiveness by Stage</h3>
            <div class="overflow-x-auto"><table class="w-full text-sm mt-2"><thead class="bg-gray-50"><tr>
                <th class="text-left px-4 py-2 text-xs font-medium text-gray-500 uppercase">Stage</th>
                <th class="text-left px-4 py-2 text-xs font-medium text-gray-500 uppercase">Users</th>
                <th class="text-left px-4 py-2 text-xs font-medium text-gray-500 uppercase">Avg Baseline</th>
                <th class="text-left px-4 py-2 text-xs font-medium text-gray-500 uppercase">Avg Final</th>
                <th class="text-left px-4 py-2 text-xs font-medium text-gray-500 uppercase">Improvement</th>
                <th class="text-left px-4 py-2 text-xs font-medium text-gray-500 uppercase">Completion</th>
            </tr></thead><tbody class="divide-y divide-gray-100">
                ${Object.entries(sd).map(([stage,d])=>{
                    const ab=d.baselines.length?(d.baselines.reduce((s,v)=>s+v,0)/d.baselines.length).toFixed(1):'-';
                    const af=d.finals.length?(d.finals.reduce((s,v)=>s+v,0)/d.finals.length).toFixed(1):'-';
                    const imp=ab!=='-'&&af!=='-'?(ab-af).toFixed(1):'-';
                    const cr=d.count?((d.completed/d.count)*100).toFixed(0)+'%':'-';
                    return `<tr><td class="px-4 py-2 font-medium">${stageLabel[stage]||stage}</td><td class="px-4 py-2">${d.count}</td><td class="px-4 py-2">${ab}</td><td class="px-4 py-2">${af}</td><td class="px-4 py-2 ${imp>0?'text-green-600 font-medium':''}">${imp>0?'-'+imp:imp}</td><td class="px-4 py-2">${cr}</td></tr>`;
                }).join('')}
            </tbody></table></div>
        </div>
    </div>`;

    if(avgPW.length){
        state.charts.c4=new Chart(document.getElementById('c4'),{type:'line',
            data:{labels:avgPW.map(d=>'Week '+d.week),datasets:[{label:'Avg Pain',data:avgPW.map(d=>d.avg),borderColor:'#3b82f6',backgroundColor:'#3b82f620',tension:.3,fill:true,pointRadius:4}]},
            options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:10,title:{display:true,text:'Pain Score'}}},plugins:{legend:{display:false}}}
        });
    }
    const bau=Object.values(upain);
    if(bau.length){
        state.charts.c5=new Chart(document.getElementById('c5'),{type:'bar',
            data:{labels:bau.map(u=>u.name),datasets:[{label:'Baseline',data:bau.map(u=>u.baseline),backgroundColor:'#ef4444',borderRadius:4},{label:'Latest',data:bau.map(u=>u.latest),backgroundColor:'#10b981',borderRadius:4}]},
            options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:10}},plugins:{legend:{position:'bottom',labels:{boxWidth:10}}}}
        });
    }
    if(aw.length){
        state.charts.c6=new Chart(document.getElementById('c6'),{type:'bar',
            data:{labels:aw.map(w=>'Week '+w),datasets:[{label:'Adherence %',data:aw.map(w=>wa[w].t?(wa[w].c/wa[w].t*100).toFixed(1):0),backgroundColor:'#8b5cf6',borderRadius:4}]},
            options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,title:{display:true,text:'%'}}},plugins:{legend:{display:false}}}
        });
    }
}

        </tr></thead><tbody id="uTb" class="divide-y divide-gray-100"></tbody></table></div>

    window._usersData=profiles.map(p=>{

function filterUsers(){
    const st=document.getElementById('fSt')?.value||'';
    const sg=document.getElementById('fSg')?.value||'';
    const sr=(document.getElementById('fSr')?.value||'').toLowerCase();
    const data=(window._usersData||[]).filter(p=>{
        if(st&&p.enrollment_status!==st)return false;
        if(sg&&p.stage!==sg)return false;
        if(sr&&!(p.name||'').toLowerCase().includes(sr)&&!(p.phone||'').includes(sr))return false;
        return true;
    });
    const c=document.getElementById('uCnt');if(c)c.textContent=data.length+' users';
    const tb=document.getElementById('uTb');if(!tb)return;
    if(!data.length){tb.innerHTML=ER(10,'No users match filters');return;}
    tb.innerHTML=data.map(p=>`<tr class="hover:bg-gray-50 cursor-pointer" onclick="navigateTo('user/${p.user_id}')">
        <td class="px-6 py-3 font-medium text-gray-900">${p.name||'-'}</td>
        <td class="px-6 py-3 text-gray-500 text-xs">${p.phone||'-'}</td>
        <td class="px-6 py-3 text-gray-500 text-xs">${p.city||'-'}</td>
        <td class="px-6 py-3">${p.stage?B(stageLabel[p.stage]||p.stage,'bg-gray-100 text-gray-600'):'-'}</td>
        <td class="px-6 py-3">${p.enrollment_status?B(fmt.cap(p.enrollment_status),statusColor[p.enrollment_status]||'bg-gray-100 text-gray-700'):B('Lead','bg-gray-100 text-gray-500')}</td>
        <td class="px-6 py-3">${p.current_week!=null?p.current_week+'/12':'-'}</td>
        <td class="px-6 py-3">${p.intake_pain_score!=null?p.intake_pain_score+'/10':'-'}</td>
        <td class="px-6 py-3 ${p.latest_pain!=null&&p.intake_pain_score!=null&&p.latest_pain<p.intake_pain_score?'text-green-600 font-medium':''}">${p.latest_pain!=null?p.latest_pain+'/10':'-'}</td>
        <td class="px-6 py-3">${p.adherence_pct!=null?p.adherence_pct+'%':'-'}</td>
        <td class="px-6 py-3 text-gray-400 text-xs">${fmt.date(p.created_at)}</td>
    </tr>`).join('');
}
function exportUsers(){const d=window._usersData||[];csvExport('users.csv',['Name','Phone','City','Stage','Status','Week','Baseline','Latest','Adherence%','Enrolled'],d.map(p=>[p.name,p.phone,p.city,stageLabel[p.stage]||p.stage,p.enrollment_status,p.current_week,p.intake_pain_score,p.latest_pain,p.adherence_pct,p.created_at]));}

                    <div class="flex justify-between"><span class="text-gray-500">Func. Level</span><span>${fmt.cap(p.functional_level)}</span></div>

                    <div class="flex justify-between"><span class="text-gray-500">Vit B12</span><span>${p.blood_marker_b12||'-'}</span></div>

            ${flags.length?`<div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="text-sm font-semibold text-gray-700 mb-3">Flags</h3><div class="flex flex-wrap gap-2">${flags.map(f=>B(f.l,f.c)).join('')}</div></div>`:''}
            <div class="bg-white rounded-xl border border-gray-200 p-6">
                <h3 class="text-sm font-semibold text-gray-700 mb-3">Purchases</h3>

            </div>
            ${p.enrollment_id?`<div class="bg-white rounded-xl border border-gray-200 p-6">
                <h3 class="text-sm font-semibold text-gray-700 mb-3">Admin Actions</h3>
                <div class="space-y-2">
                    ${p.enrollment_status==='active'?`<button onclick="adminAction('pause','${p.enrollment_id}')" class="w-full text-sm px-3 py-2 bg-yellow-50 text-yellow-700 rounded-lg hover:bg-yellow-100">Pause Program</button><button onclick="adminAction('drop','${p.enrollment_id}')" class="w-full text-sm px-3 py-2 bg-red-50 text-red-700 rounded-lg hover:bg-red-100">Mark Dropped Off</button>`:''}
                    ${p.enrollment_status==='paused'||p.enrollment_status==='dropped_off'?`<button onclick="adminAction('restart','${p.enrollment_id}')" class="w-full text-sm px-3 py-2 bg-green-50 text-green-700 rounded-lg hover:bg-green-100">Restart Program</button>`:''}
                    <select onchange="if(this.value)adminAction('changeStage','${p.enrollment_id}',this.value);this.value='';" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2"><option value="">Change Track...</option><option value="pain_management">Pain Management</option><option value="recovery">Recovery</option><option value="strengthening">Strengthening</option></select>
                </div>
            </div>`:''}
        </div>
    </div>`;

    // Pain chart
    if(metrics.length){
        const pts=[{x:0,y:p.intake_pain_score}];
        metrics.forEach(m=>pts.push({x:m.week_number,y:m.value}));
        state.charts.c7=new Chart(document.getElementById('c7'),{type:'line',
            data:{datasets:[{label:'Pain Score',data:pts,borderColor:'#3b82f6',backgroundColor:'#3b82f620',tension:.3,fill:true,pointRadius:5}]},
            options:{responsive:true,maintainAspectRatio:false,scales:{x:{type:'linear',title:{display:true,text:'Week'},min:0,max:12,ticks:{stepSize:2}},y:{min:0,max:10}},plugins:{legend:{display:false}}}
        });
    }
}

// VIEW: ESCALATIONS
// ============================================================
async function renderEscalations(app){
    const {data:allEsc}=await db.from('escalations').select('*, users(id,name,phone), program_enrollments(current_week,stage)').order('created_at',{ascending:false});
    const escalations=allEsc||[];
    const resolved=escalations.filter(e=>e.status==='resolved');

    app.innerHTML=`
    <div class="flex flex-wrap gap-3 mb-4">
        <select id="fES" onchange="filterEsc()" class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white"><option value="">All Open</option><option value="open">Open</option><option value="in_progress">In Progress</option><option value="all">All (incl. Resolved)</option></select>
        <select id="fEV" onchange="filterEsc()" class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white"><option value="">All Severities</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
        <button onclick="exportEsc()" class="ml-auto text-xs px-3 py-1.5 bg-blue-50 text-blue-700 rounded-lg hover:bg-blue-100">Export CSV</button>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden mb-6">
        <div class="px-6 py-3 border-b border-gray-100"><span class="text-xs text-gray-400" id="eCnt"></span></div>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Severity</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">User</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Reason</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Week</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Status</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Assigned</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Created</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Actions</th>
        </tr></thead><tbody id="eTb" class="divide-y divide-gray-100"></tbody></table></div>
    </div>
    <details class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <summary class="px-6 py-4 cursor-pointer text-sm font-semibold text-gray-700 hover:bg-gray-50">Resolved Cases (${resolved.length})</summary>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Severity</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">User</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Reason</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Resolution</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Resolved At</th>
        </tr></thead><tbody class="divide-y divide-gray-100">
            ${!resolved.length?ER(5,'No resolved cases'):resolved.map(e=>`<tr class="hover:bg-gray-50"><td class="px-6 py-3">${B(e.severity,sevColor[e.severity])}</td><td class="px-6 py-3 font-medium cursor-pointer text-blue-600 hover:underline" onclick="navigateTo('user/${e.user_id}')">${e.users?.name||'-'}</td><td class="px-6 py-3">${fmt.cap(e.trigger_reason)}</td><td class="px-6 py-3 text-gray-600 text-xs">${e.resolution_notes||'-'}</td><td class="px-6 py-3 text-gray-400 text-xs">${fmt.dateTime(e.resolved_at)}</td></tr>`).join('')}
        </tbody></table></div>
    </details>`;

    window._escalations=escalations;
    filterEsc();
}
function filterEsc(){
    const sf=document.getElementById('fES')?.value||'';
    const sv=document.getElementById('fEV')?.value||'';
    let data=window._escalations||[];
    if(sf==='all'){/*all*/}else if(sf){data=data.filter(e=>e.status===sf);}else{data=data.filter(e=>e.status!=='resolved');}
    if(sv)data=data.filter(e=>e.severity===sv);
    const c=document.getElementById('eCnt');if(c)c.textContent=data.length+' escalations';
    const tb=document.getElementById('eTb');if(!tb)return;
    if(!data.length){tb.innerHTML=ER(8,'No escalations match filters');return;}
    tb.innerHTML=data.map(e=>`<tr class="hover:bg-gray-50">
        <td class="px-6 py-3">${B(e.severity,sevColor[e.severity])}</td>
        <td class="px-6 py-3 font-medium cursor-pointer text-blue-600 hover:underline" onclick="navigateTo('user/${e.user_id}')">${e.users?.name||'-'}</td>
        <td class="px-6 py-3">${fmt.cap(e.trigger_reason)}</td>
        <td class="px-6 py-3">Week ${e.program_enrollments?.current_week||'-'}</td>
        <td class="px-6 py-3">${B(e.status,e.status==='resolved'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700')}</td>
        <td class="px-6 py-3"><select onchange="assignEsc('${e.id}',this.value)" class="text-xs border rounded px-2 py-1"><option value="">Unassigned</option>${TEAM.map(t=>`<option value="${t}" ${e.assigned_to===t?'selected':''}>${t}</option>`).join('')}</select></td>
        <td class="px-6 py-3 text-gray-400 text-xs">${fmt.dateTime(e.created_at)}</td>
        <td class="px-6 py-3"><div class="flex gap-1">${e.status!=='resolved'?`<button onclick="resolveEsc('${e.id}')" class="text-xs px-2 py-1 bg-green-50 text-green-700 rounded hover:bg-green-100">Resolve</button>`:''}<button onclick="addEscNote('${e.id}')" class="text-xs px-2 py-1 bg-gray-50 text-gray-600 rounded hover:bg-gray-100">Note</button></div></td>
    </tr>`).join('');
}
function exportEsc(){const d=window._escalations||[];csvExport('escalations.csv',['Severity','User','Reason','Status','Assigned','Created','Resolved'],d.map(e=>[e.severity,e.users?.name,e.trigger_reason,e.status,e.assigned_to,e.created_at,e.resolved_at]));}

// ============================================================
// VIEW: MESSAGES
// ============================================================
async function renderMessages(app){
    const {data:messages}=await db.from('message_log').select('*, users(name,phone)').order('sent_at',{ascending:false});
    const msgs=messages||[];
    const out=msgs.filter(m=>m.direction==='outbound');
    const total=out.length;
    const del=out.filter(m=>m.delivery_status==='delivered'||m.delivery_status==='read').length;
    const rd=out.filter(m=>m.delivery_status==='read').length;
    const inb=msgs.filter(m=>m.direction==='inbound').length;
    const delPct=total?((del/total)*100).toFixed(0):0;
    const rdPct=total?((rd/total)*100).toFixed(0):0;

    // Weekly grouping
    const wm={};
    msgs.forEach(m=>{if(!m.sent_at)return;const d=new Date(m.sent_at);const w=d.getFullYear()+'-W'+String(Math.ceil(d.getDate()/7)).padStart(2,'0')+'-'+String(d.getMonth()+1).padStart(2,'0');if(!wm[w])wm[w]={o:0,i:0};if(m.direction==='outbound')wm[w].o++;else wm[w].i++;});
    const sw=Object.keys(wm).sort();

    app.innerHTML=`
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        ${SC('Total Sent',total,'text-blue-600')}
        ${SC('Delivered Rate',delPct+'%','text-green-600')}
        ${SC('Read Rate',rdPct+'%','text-purple-600')}
        ${SC('Inbound',inb)}
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6"><h3 class="text-sm font-semibold text-gray-700 mb-4">Messages Over Time</h3><div class="h-48"><canvas id="c8"></canvas></div></div>
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div class="px-6 py-3 border-b border-gray-100 flex justify-between items-center"><h3 class="text-sm font-semibold text-gray-700">Recent Messages</h3><button onclick="exportMsgs()" class="text-xs text-blue-600 hover:underline">Export CSV</button></div>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">User</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Direction</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Type</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Summary</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Status</th>
            <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase">Date</th>
        </tr></thead><tbody class="divide-y divide-gray-100">
            ${!msgs.length?ER(6,'No messages yet'):msgs.slice(0,100).map(m=>`<tr class="hover:bg-gray-50"><td class="px-6 py-3 font-medium cursor-pointer text-blue-600 hover:underline" onclick="navigateTo('user/${m.user_id}')">${m.users?.name||'-'}</td><td class="px-6 py-3">${m.direction==='outbound'?'<span class="text-blue-500">&#8593; Out</span>':'<span class="text-green-500">&#8595; In</span>'}</td><td class="px-6 py-3"><span class="px-2 py-0.5 bg-gray-100 rounded text-xs">${m.message_type||'-'}</span></td><td class="px-6 py-3 text-gray-600 text-xs max-w-xs truncate">${fmt.trunc(m.content_summary)}</td><td class="px-6 py-3 text-xs">${m.delivery_status||'-'}</td><td class="px-6 py-3 text-gray-400 text-xs">${fmt.dateTime(m.sent_at)}</td></tr>`).join('')}
        </tbody></table></div>
    </div>`;

    window._messages=msgs;
    if(sw.length){
        state.charts.c8=new Chart(document.getElementById('c8'),{type:'bar',
            data:{labels:sw,datasets:[{label:'Outbound',data:sw.map(w=>wm[w].o),backgroundColor:'#3b82f6',borderRadius:4},{label:'Inbound',data:sw.map(w=>wm[w].i),backgroundColor:'#10b981',borderRadius:4}]},
            options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true}},plugins:{legend:{position:'bottom',labels:{boxWidth:10}}}}
        });
    }
}
function exportMsgs(){const d=window._messages||[];csvExport('messages.csv',['User','Direction','Type','Summary','Status','Date'],d.map(m=>[m.users?.name,m.direction,m.message_type,m.content_summary,m.delivery_status,m.sent_at]));}

// ============================================================
// ADMIN ACTIONS
// ============================================================
async function adminAction(action,enrollmentId,value){
    if(!enrollmentId)return;
    let u={};
    switch(action){
        case 'pause':u={status:'paused'};break;
        case 'restart':u={status:'active'};break;
        case 'drop':u={status:'dropped_off',dropped_off_at:new Date().toISOString()};break;
        case 'changeStage':u={stage:value};break;
        default:return;
    }
    const {error}=await db.from('program_enrollments').update(u).eq('id',enrollmentId);
    if(error){alert('Error: '+error.message);return;}
    handleRoute();
}
async function assignEsc(id,assignee){
    const u={assigned_to:assignee||null};
    if(assignee)u.status='in_progress';
    const {error}=await db.from('escalations').update(u).eq('id',id);
    if(error)alert('Error: '+error.message);else handleRoute();
}
async function resolveEsc(id){
    const note=prompt('Resolution notes (optional):');
    const {error}=await db.from('escalations').update({status:'resolved',resolution_notes:note||null,resolved_at:new Date().toISOString()}).eq('id',id);
    if(error)alert('Error: '+error.message);else handleRoute();
}
async function addEscNote(id){
    const note=prompt('Add note:');
    if(!note)return;
    const {data:esc}=await db.from('escalations').select('resolution_notes').eq('id',id).single();
    const existing=esc?.resolution_notes||'';
    const {error}=await db.from('escalations').update({resolution_notes:existing?existing+'\n'+note:note}).eq('id',id);
    if(error)alert('Error: '+error.message);else handleRoute();
}

    tab.addEventListener('click',()=>navigateTo(tab.dataset.route));

window.addEventListener('hashchange',handleRoute);
handleRoute();
setInterval(()=>{if(!document.hidden)handleRoute();},60000);
